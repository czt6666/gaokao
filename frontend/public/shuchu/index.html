<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>输出</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--s3:#282828;
  --border:#2c2c2c;--text:#e2e2e2;--dim:#666;--dim2:#999;
  --accent:#7c6af7;--ab:rgba(124,106,247,.14);--abh:rgba(124,106,247,.26);
  --green:#4ade80;--gb:rgba(74,222,128,.1);
  --amber:#f59e0b;--red:#f87171;--r:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.logo{font-size:17px;font-weight:900;letter-spacing:-1px;flex-shrink:0}
.stage-bar{display:flex;align-items:center;gap:0;flex:1;justify-content:center}
.stp{display:flex;align-items:center;gap:5px;padding:4px 13px;border-radius:20px;font-size:12px;color:var(--dim);transition:all .3s}
.stp .d{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .3s;flex-shrink:0}
.stp.active{color:var(--accent)}.stp.active .d{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.stp.done{color:var(--green)}.stp.done .d{background:var(--green)}
.sarr{color:var(--border);font-size:11px}
.hbtn{background:none;border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.hbtn:hover{border-color:var(--dim2);color:var(--text)}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden}

/* LEFT SIDEBAR: sessions */
.sidebar{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.new-kb-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-weight:600}
.session-list{flex:1;overflow-y:auto;padding:6px}
.session-item{padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.session-item:hover{background:var(--s2)}
.session-item.active{background:var(--ab);border:1px solid var(--abh)}
.si-title{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-meta{font-size:11px;color:var(--dim2);display:flex;gap:6px;align-items:center}
.si-score{color:var(--accent)}

/* CHAT COL */
.chat-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{display:flex;gap:9px;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.assistant{align-self:flex-start;max-width:min(660px,90%)}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:min(540px,88%)}
.msg.system-msg{align-self:center}

.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.msg.assistant .av{background:var(--ab);color:var(--accent)}
.msg.user .av{background:var(--gb);color:var(--green)}

.bubble{padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.assistant .bubble{background:var(--s1);border:1px solid var(--border);border-top-left-radius:3px}
.msg.user .bubble{background:var(--ab);border:1px solid var(--abh);border-top-right-radius:3px}
.msg.system-msg .bubble{background:var(--s2);border:1px solid var(--border);font-size:12px;color:var(--dim2);padding:6px 12px;border-radius:20px}

/* file pills in chat */
.file-pill{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--dim2);margin-bottom:6px}
.file-pill .ficon{color:var(--accent);font-size:14px}
.file-pill .fname{color:var(--text);font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-pill .flen{color:var(--dim)}

/* typing */
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);border-top-left-radius:3px;width:fit-content}
.typing span{width:5px;height:5px;background:var(--dim);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* compile bar */
.compile-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--s2);border:1px solid var(--abh);border-radius:var(--r);margin:0 20px 8px;font-size:13px;color:var(--accent)}
.compile-bar.hidden{display:none}
.spin{width:13px;height:13px;border:2px solid var(--ab);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* output */
.out-wrap{margin:0 20px 10px;display:none}.out-wrap.visible{display:block}
.out-card{background:var(--s1);border:1px solid var(--green);border-radius:var(--r);overflow:hidden}
.out-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid rgba(74,222,128,.2);background:var(--gb)}
.out-label{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.copy-btn{background:none;border:1px solid rgba(74,222,128,.4);color:var(--green);padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.copy-btn:hover{background:var(--gb)}
.out-body{padding:14px;font-size:14px;line-height:1.75;white-space:pre-wrap;max-height:260px;overflow-y:auto}

/* goal prompt */
.goal-box{display:none;padding:12px 16px;background:var(--s2);border:1px solid var(--accent);border-radius:var(--r);margin:0 20px 10px}
.goal-box.visible{display:block}
.goal-box p{font-size:13px;color:var(--dim2);margin-bottom:9px}
.goal-row{display:flex;gap:7px}
.goal-in{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.goal-in:focus{border-color:var(--accent)}
.goal-ok{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.goal-ok:hover{opacity:.85}

/* input area */
.input-area{padding:12px 20px 16px;border-top:1px solid var(--border);flex-shrink:0;display:none}

/* upload strip */
.upload-strip{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.up-btn{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);color:var(--dim2);padding:5px 11px;border-radius:7px;font-size:12px;cursor:pointer;transition:all .2s}
.up-btn:hover{border-color:var(--accent);color:var(--accent)}
.up-btn input{display:none}
.pending-files{display:flex;gap:5px;flex-wrap:wrap}
.pf{display:flex;align-items:center;gap:4px;background:var(--ab);border:1px solid var(--abh);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--accent)}
.pf .rm{cursor:pointer;color:var(--dim);margin-left:2px;font-size:13px;line-height:1}
.pf .rm:hover{color:var(--red)}

.irow{display:flex;gap:8px;align-items:flex-end}
.txt{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.5;min-height:44px;max-height:120px;transition:border-color .2s}
.txt:focus{border-color:var(--accent)}.txt::placeholder{color:var(--dim)}.txt:disabled{opacity:.4}
.send{width:44px;height:44px;background:var(--accent);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s}
.send:hover{opacity:.85}.send:active{transform:scale(.93)}.send:disabled{opacity:.3;cursor:not-allowed}
.send svg{width:17px;height:17px;fill:#fff}

/* WELCOME */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.welcome h1{font-size:50px;font-weight:900;letter-spacing:-3px;margin-bottom:12px;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:14px;color:var(--dim2);max-width:360px;line-height:1.7;margin-bottom:24px}
.start-box{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px}

/* welcome upload zone */
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--s1)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--ab)}
.drop-zone input{display:none}
.drop-icon{font-size:28px;margin-bottom:6px}
.drop-label{font-size:13px;color:var(--dim2)}
.drop-label span{color:var(--accent)}
.drop-formats{font-size:11px;color:var(--dim);margin-top:4px}

.welcome-files{display:flex;flex-direction:column;gap:5px}
.wf{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:8px;padding:7px 12px;font-size:13px}
.wf-name{color:var(--text);font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wf-size{font-size:11px;color:var(--dim2)}
.wf-rm{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
.wf-rm:hover{color:var(--red)}

.or-div{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:12px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}

.start-ta{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.6;height:72px;transition:border-color .2s}
.start-ta:focus{border-color:var(--accent)}.start-ta::placeholder{color:var(--dim)}
.start-btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.start-btn:hover{opacity:.85}.start-btn:disabled{opacity:.5;cursor:not-allowed}

/* RIGHT: wiki panel */
.wiki-col{width:320px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .35s}
.wiki-col.hidden{width:0;border:none;overflow:hidden}
.wiki-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wiki-title-text{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.hring{display:flex;align-items:center;gap:4px;flex-shrink:0}
.hring svg{width:24px;height:24px}
.hring circle{fill:none;stroke-width:3;stroke-linecap:round}
.hring .trk{stroke:var(--border)}
.hring .fil{stroke:var(--accent);transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .6s,stroke .6s}
.hring-val{font-size:11px;color:var(--dim2)}

.wiki-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px}
.wiki-body::-webkit-scrollbar{width:3px}.wiki-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.wiki-ph{color:var(--dim);font-size:13px;line-height:1.7;text-align:center;padding:30px 16px}

.wsec-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.warticle{font-size:13px;line-height:1.75;color:var(--dim2);border-left:2px solid var(--border);padding-left:11px}
.warticle.loaded{color:var(--text)}

.nodes-wrap{display:flex;flex-wrap:wrap;gap:5px}
.nchip{padding:3px 10px;background:var(--ab);border:1px solid var(--abh);border-radius:20px;font-size:11px;color:var(--accent)}

.conn-list{display:flex;flex-direction:column;gap:5px}
.conn{background:var(--s2);border-radius:7px;padding:7px 10px;font-size:12px;line-height:1.5}
.conn-n{color:var(--text);font-weight:600;margin-bottom:1px}
.conn-r{color:var(--dim2)}
.carr{color:var(--accent);margin:0 3px}

.app-list,.gap-list{display:flex;flex-direction:column;gap:4px}
.app-item,.gap-item{background:var(--s2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--dim2);display:flex;gap:6px}
.app-item::before{content:"→";color:var(--green);flex-shrink:0}
.gap-item::before{content:"?";color:var(--amber);font-weight:700;flex-shrink:0}

.src-list{display:flex;flex-direction:column;gap:4px}
.src-item{background:var(--s2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--dim2);display:flex;gap:5px;align-items:center}
.src-item::before{content:"📄";font-size:11px}

/* research auth button */
.research-bar{margin-top:4px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.research-bar.hidden{display:none}
.research-info{font-size:12px;color:var(--amber);flex:1}
.research-info span{font-weight:700}
.research-btn{background:var(--amber);color:#000;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.research-btn:hover{opacity:.85}
.research-btn:disabled{opacity:.4;cursor:not-allowed}

/* banner */
.banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2a1a1a;border:1px solid var(--red);color:var(--red);padding:9px 18px;border-radius:9px;font-size:12px;z-index:999;animation:up .2s ease;white-space:nowrap}
</style>
</head>
<body>

<header>
  <div class="logo">输出</div>
  <div class="stage-bar">
    <div class="stp active" id="step0"><div class="d"></div>输入</div>
    <div class="sarr">›</div>
    <div class="stp" id="step1"><div class="d"></div>编译</div>
    <div class="sarr">›</div>
    <div class="stp" id="step2"><div class="d"></div>创作</div>
  </div>
  <button class="hbtn" onclick="newSession()">新知识库</button>
</header>

<div class="main">

  <!-- LEFT: session list -->
  <div class="sidebar">
    <div class="sidebar-head">
      <span>知识库</span>
      <button class="new-kb-btn" onclick="newSession()">+ 新建</button>
    </div>
    <div class="session-list" id="sessionList">
      <div style="font-size:12px;color:var(--dim);padding:12px 10px">暂无知识库</div>
    </div>
  </div>

  <!-- CENTER: chat -->
  <div class="chat-col">

    <!-- welcome -->
    <div class="welcome" id="welcome">
      <h1>输出</h1>
      <p>上传文件或输入想法，我帮你把它变成你想要的任何东西。</p>
      <div class="start-box">

        <!-- drop zone -->
        <div class="drop-zone" id="dropZone"
             ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)"
             onclick="$('dzInput').click()">
          <input type="file" id="dzInput" multiple accept=".pdf,.txt,.md,.docx,.png,.jpg,.jpeg"
                 onchange="dzFiles(this.files)">
          <div class="drop-icon">📂</div>
          <div class="drop-label">拖拽文件到这里，或 <span>点击选择</span></div>
          <div class="drop-formats">支持 PDF · Word · TXT · 图片</div>
        </div>

        <!-- pending files list -->
        <div class="welcome-files" id="welcomeFiles"></div>

        <div class="or-div">或者直接输入想法</div>

        <textarea class="start-ta" id="startTa"
                  placeholder="比如：我最近在学色彩构成，想整理一下……"
                  onkeydown="startKey(event)"></textarea>
        <button class="start-btn" id="startBtn" onclick="startSession()">开始</button>
      </div>
    </div>

    <!-- messages -->
    <div class="msgs" id="msgs" style="display:none"></div>

    <!-- compile spinner -->
    <div class="compile-bar hidden" id="compileBar">
      <div class="spin"></div><span id="compileMsg">正在编译知识库…</span>
    </div>

    <!-- output -->
    <div class="out-wrap" id="outWrap">
      <div class="out-card">
        <div class="out-head">
          <span class="out-label">你的成果</span>
          <button class="copy-btn" onclick="copyOut()">复制</button>
        </div>
        <div class="out-body" id="outBody"></div>
      </div>
    </div>

    <!-- goal -->
    <div class="goal-box" id="goalBox">
      <p>知识库已编译完成。你想用这些，做出什么？</p>
      <div class="goal-row">
        <input class="goal-in" id="goalIn"
               placeholder="一篇文章、视频脚本、一封信、方案……任何东西"
               onkeydown="if(event.key==='Enter')startCreate()"/>
        <button class="goal-ok" onclick="startCreate()">开始创作</button>
      </div>
    </div>

    <!-- input -->
    <div class="input-area" id="inputArea">
      <div class="upload-strip">
        <label class="up-btn">
          <input type="file" multiple accept=".pdf,.txt,.md,.docx,.png,.jpg,.jpeg"
                 onchange="addPendingFiles(this.files);this.value=''">
          📎 添加文件
        </label>
        <div class="pending-files" id="pendingFiles"></div>
      </div>
      <div class="irow">
        <textarea class="txt" id="chatIn" placeholder="输入补充说明，或直接发送文件…"
                  rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
        <button class="send" id="sendBtn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- RIGHT: wiki panel -->
  <div class="wiki-col hidden" id="wikiCol">
    <div class="wiki-head">
      <div class="wiki-title-text" id="wikiTitleText">知识库</div>
      <div class="hring">
        <svg viewBox="0 0 24 24">
          <circle class="trk" cx="12" cy="12" r="9"/>
          <circle class="fil" id="hfil" cx="12" cy="12" r="9"
                  stroke-dasharray="56.55" stroke-dashoffset="56.55"/>
        </svg>
        <span class="hring-val" id="hval">-</span>
      </div>
    </div>
    <!-- research bar (appears when gaps exist) -->
    <div class="research-bar hidden" id="researchBar">
      <div class="research-info" id="researchInfo">发现知识空白，AI 可自动搜索补充</div>
      <button class="research-btn" id="researchBtn" onclick="runResearch()">授权搜索</button>
    </div>
    <div class="wiki-body" id="wikiBody">
      <div class="wiki-ph">投入内容后，AI 会自动编译成结构化知识库，显示在这里。</div>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:8000';
const $ = id => document.getElementById(id);

let sessionId = '';
let stage = 'explore';
let history = [];
let exploreHistory = [];
let outputGoal = '';
let streaming = false;
let pendingFiles = [];        // {name, text} already uploaded
let welcomeRawFiles = [];     // File objects on welcome screen
let wikiData = null;

// ── Utils ─────────────────────────────────────

function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function startKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startSession()}}
function scrollBot(){const m=$('msgs');m.scrollTop=m.scrollHeight}

function setStage(s){
  stage=s;
  const idx={explore:0,compile:1,create:2,done:2}[s]??0;
  ['step0','step1','step2'].forEach((id,i)=>{
    const el=$(id);
    el.className='stp'+(i<idx?' done':i===idx?' active':'');
  });
}

function showBanner(msg,ms=4000){
  const old=document.querySelector('.banner');if(old)old.remove();
  const el=document.createElement('div');el.className='banner';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),ms);
}

// ── Drop zone ─────────────────────────────────

function dzOver(e){e.preventDefault();$('dropZone').classList.add('dragover')}
function dzLeave(){$('dropZone').classList.remove('dragover')}
function dzDrop(e){e.preventDefault();$('dropZone').classList.remove('dragover');dzFiles(e.dataTransfer.files)}
function dzFiles(files){[...files].forEach(f=>addWelcomeFile(f))}

function addWelcomeFile(file){
  welcomeRawFiles.push(file);
  renderWelcomeFiles();
}
function removeWelcomeFile(i){
  welcomeRawFiles.splice(i,1);renderWelcomeFiles();
}
function renderWelcomeFiles(){
  const c=$('welcomeFiles');c.innerHTML='';
  welcomeRawFiles.forEach((f,i)=>{
    const d=document.createElement('div');d.className='wf';
    d.innerHTML=`<span class="wf-name">📄 ${f.name}</span>
                 <span class="wf-size">${(f.size/1024).toFixed(0)} KB</span>
                 <button class="wf-rm" onclick="removeWelcomeFile(${i})">×</button>`;
    c.appendChild(d);
  });
}

// ── Pending files in chat ──────────────────────

function addPendingFiles(files){
  [...files].forEach(f=>{
    // just queue them; upload happens on send
    pendingFiles.push({file:f,name:f.name,text:null});
  });
  renderPending();
}
function removePending(i){pendingFiles.splice(i,1);renderPending()}
function renderPending(){
  const c=$('pendingFiles');c.innerHTML='';
  pendingFiles.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pf';
    d.innerHTML=`<span>📄</span><span style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
                 <span class="rm" onclick="removePending(${i})">×</span>`;
    c.appendChild(d);
  });
}

// ── Upload file to backend ────────────────────

async function uploadFile(file){
  const fd=new FormData();
  fd.append('session_id',sessionId);
  fd.append('file',file);
  const r=await fetch(`${API}/api/upload`,{method:'POST',body:fd});
  return await r.json(); // {filename, text, length}
}

// ── Session list ──────────────────────────────

async function loadSessionList(){
  try{
    const r=await fetch(`${API}/api/sessions`);
    const list=await r.json();
    const c=$('sessionList');
    if(!list.length){c.innerHTML='<div style="font-size:12px;color:var(--dim);padding:12px 10px">暂无知识库</div>';return;}
    c.innerHTML='';
    list.forEach(s=>{
      const d=document.createElement('div');
      d.className='session-item'+(s.session_id===sessionId?' active':'');
      d.onclick=()=>loadSession(s.session_id);
      d.innerHTML=`<div class="si-title">${s.title||'未命名'}</div>
                   <div class="si-meta">
                     <span class="si-score">${s.health_score}%</span>
                     <span>${s.node_count} 个节点</span>
                     ${s.sources.length?`<span>${s.sources.length} 个文件</span>`:''}
                   </div>`;
      c.appendChild(d);
    });
  }catch(e){}
}

async function loadSession(sid){
  sessionId=sid;
  try{
    const r=await fetch(`${API}/api/wiki/${sid}`);
    wikiData=await r.json();
    if(wikiData&&wikiData.article){
      renderWiki(wikiData);
      showChatMode();
      setStage('create');
      addSysMsg(`已加载知识库"${wikiData.title||'未命名'}"，可以直接开始创作。`);
      $('goalBox').classList.add('visible');
    }
  }catch(e){}
  loadSessionList();
}

function showChatMode(){
  $('welcome').style.display='none';
  $('msgs').style.display='flex';
  $('inputArea').style.display='block';
}

// ── Start session ─────────────────────────────

async function startSession(){
  const text=$('startTa').value.trim();
  if(!text&&!welcomeRawFiles.length){showBanner('请输入想法或上传文件');return;}

  const btn=$('startBtn');
  btn.textContent='准备中…';btn.disabled=true;

  try{
    const r=await fetch(`${API}/api/session`);
    const d=await r.json();
    sessionId=d.session_id;
  }catch(e){
    btn.textContent='开始';btn.disabled=false;
    showBanner('无法连接后端，请先启动服务');return;
  }

  btn.textContent='开始';btn.disabled=false;
  history=[];exploreHistory=[];pendingFiles=[];
  showChatMode();

  const hasFiles=welcomeRawFiles.length>0;

  if(hasFiles){
    // ── Hermes autonomous mode: files present → skip questioning ──
    setStage('compile');
    const uploads=[];
    for(const f of welcomeRawFiles){
      addSysMsg(`正在读取 ${f.name}…`);
      const res=await uploadFile(f);
      uploads.push({name:res.filename,text:res.text});
      showFilePill(res.filename,res.length);
    }
    welcomeRawFiles=[];renderWelcomeFiles();

    // optional text as extra context
    if(text){
      addMsg('user',text);
    }

    await runAutoProcess(uploads);
  }else{
    // ── Text-only mode: Socratic exploration ──
    setStage('explore');
    addMsg('user',text);
    history.push({role:'user',content:text});
    exploreHistory.push({role:'user',content:text});
    await streamChat(exploreHistory,'explore');
  }

  loadSessionList();
}

// ── Send in chat ──────────────────────────────

async function sendMsg(){
  if(streaming)return;
  const el=$('chatIn');
  const text=el.value.trim();
  const hasFiles=pendingFiles.length>0;
  if(!text&&!hasFiles)return;

  el.value='';el.style.height='auto';

  if(hasFiles){
    // Upload all pending files
    const uploads=[];
    for(const pf of pendingFiles){
      if(pf.text){uploads.push(pf);continue;}
      addSysMsg(`正在读取 ${pf.name}…`);
      const res=await uploadFile(pf.file);
      uploads.push({name:pf.name,text:res.text});
      showFilePill(pf.name,res.length);
    }
    pendingFiles=[];renderPending();
    if(text){addMsg('user',text);}
    // Always autoprocess when files are added, regardless of stage
    await runAutoProcess(uploads);
  }else{
    // Text only
    addMsg('user',text);
    history.push({role:'user',content:text});
    if(stage==='explore'){
      exploreHistory.push({role:'user',content:text});
      await streamChat(exploreHistory,'explore');
    }else if(stage==='create'){
      await streamChat(history,'create');
    }
  }
}

// ── Messages ──────────────────────────────────

function addMsg(role,text){
  const w=document.createElement('div');w.className=`msg ${role}`;
  const av=document.createElement('div');av.className='av';av.textContent=role==='assistant'?'✦':'你';
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  w.appendChild(av);w.appendChild(b);
  $('msgs').appendChild(w);scrollBot();return b;
}
function addSysMsg(text){
  const w=document.createElement('div');w.className='msg system-msg';
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  w.appendChild(b);$('msgs').appendChild(w);scrollBot();
}
function showFilePill(name,len){
  const w=document.createElement('div');w.className='msg assistant';
  const av=document.createElement('div');av.className='av';av.textContent='✦';
  const pill=document.createElement('div');pill.className='file-pill';
  pill.innerHTML=`<span class="ficon">📄</span><span class="fname">${name}</span>
                  <span class="flen">${(len/1000).toFixed(1)}k 字符已提取</span>`;
  w.appendChild(av);w.appendChild(pill);
  $('msgs').appendChild(w);scrollBot();
}
function showTyping(){
  const w=document.createElement('div');w.className='msg assistant';w.id='typing';
  const av=document.createElement('div');av.className='av';av.textContent='✦';
  const t=document.createElement('div');t.className='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  w.appendChild(av);w.appendChild(t);$('msgs').appendChild(w);scrollBot();
}
function rmTyping(){const el=$('typing');if(el)el.remove()}

// ── Stream ────────────────────────────────────

async function streamChat(messages,stageParam){
  streaming=true;$('sendBtn').disabled=true;$('chatIn').disabled=true;
  showTyping();
  const body={session_id:sessionId,messages,stage:stageParam,output_goal:outputGoal};
  try{
    const res=await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const reader=res.body.getReader();const dec=new TextDecoder();
    let buf='',full='';
    rmTyping();
    const bubble=addMsg('assistant','');
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{const d=JSON.parse(line.slice(6));if(d.content){full+=d.content;bubble.textContent=full;scrollBot()}}catch{}
      }
    }
    history.push({role:'assistant',content:full});
    if(stageParam==='explore'){
      exploreHistory.push({role:'assistant',content:full});
      if(full.includes('【EXPLORE_DONE】')){
        bubble.textContent=full.replace('【EXPLORE_DONE】','').trim();
        await runCompile();
      }
    }else if(stageParam==='create'){
      if(full.includes('【OUTPUT_DONE】')){
        const m=full.match(/```output\n?([\s\S]*?)```/);
        if(m){$('outWrap').classList.add('visible');$('outBody').textContent=m[1].trim()}
        $('inputArea').style.display='none';setStage('done');
      }
    }
  }catch(err){
    rmTyping();addMsg('assistant',`出错：${err.message}`);
  }
  streaming=false;$('sendBtn').disabled=false;$('chatIn').disabled=false;$('chatIn').focus();
}

// ── Hermes Auto Process (files → analyze → compile, no questions) ─────

async function runAutoProcess(uploads){
  streaming=true;
  $('sendBtn').disabled=true;$('chatIn').disabled=true;
  $('inputArea').style.display='none';
  setStage('compile');

  const rawTexts=uploads.map(u=>u.text);
  const sourceNames=uploads.map(u=>u.name);

  try{
    const res=await fetch(`${API}/api/autoprocess`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId,raw_texts:rawTexts,source_names:sourceNames})
    });
    if(!res.ok)throw new Error(`HTTP ${res.status}`);

    const reader=res.body.getReader();const dec=new TextDecoder();
    let buf='',full='';
    const bubble=addMsg('assistant','');  // live analysis stream

    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='analysis'){
            full+=d.content;bubble.textContent=full;scrollBot();
          }else if(d.type==='compiling'){
            $('compileBar').classList.remove('hidden');
            $('compileMsg').textContent='正在编译知识库…';
          }else if(d.type==='wiki'){
            wikiData=d.wiki;
            renderWiki(wikiData);
            $('compileBar').classList.add('hidden');
            addSysMsg(`✓ 知识库"${wikiData.title||'未命名'}"已就绪，健康度 ${wikiData.health_score}%`);
            $('goalBox').classList.add('visible');
            setStage('create');
            loadSessionList();
          }else if(d.type==='error'){
            addSysMsg(`编译出错：${d.message}`);
          }
        }catch{}
      }
    }
  }catch(err){
    addMsg('assistant',`自动处理出错：${err.message}`);
    setStage('explore');
  }

  $('compileBar').classList.add('hidden');
  $('inputArea').style.display='block';
  streaming=false;$('sendBtn').disabled=false;$('chatIn').disabled=false;
}

// ── Compile (text-only path after Socratic explore) ───────────────────

async function runCompile(){
  setStage('compile');
  $('compileBar').classList.remove('hidden');
  $('inputArea').style.display='none';

  try{
    const r=await fetch(`${API}/api/compile`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId,messages:exploreHistory,raw_texts:[],source_names:[]})
    });
    wikiData=await r.json();
    renderWiki(wikiData);
    addSysMsg(`✓ 知识库"${wikiData.title||'未命名'}"已就绪，健康度 ${wikiData.health_score}%`);
    $('goalBox').classList.add('visible');
    setStage('create');
  }catch(err){
    addMsg('assistant',`知识库编译失败：${err.message}`);
    setStage('explore');
  }

  $('compileBar').classList.add('hidden');
  $('inputArea').style.display='block';
  loadSessionList();
}

// ── Create ────────────────────────────────────

function startCreate(){
  const goal=$('goalIn').value.trim();
  if(!goal)return;
  outputGoal=goal;
  $('goalBox').classList.remove('visible');
  setStage('create');
  addMsg('user',`我想要：${goal}`);
  history.push({role:'user',content:`我想要：${goal}`});
  streamChat(history,'create');
}

// ── Render wiki ───────────────────────────────

function renderWiki(w){
  $('wikiCol').classList.remove('hidden');
  const score=w.health_score??0;
  const circ=2*Math.PI*9;
  $('hfil').style.strokeDashoffset=circ*(1-score/100);
  $('hfil').style.stroke=score>=70?'var(--green)':score>=45?'var(--amber)':'var(--red)';
  $('hval').textContent=`${score}%`;
  $('wikiTitleText').textContent=w.title||'知识库';

  // Show/hide research bar based on gaps
  const gaps=w.gaps||[];
  const rbar=$('researchBar');
  if(gaps.length>0){
    rbar.classList.remove('hidden');
    $('researchInfo').innerHTML=`发现 <span>${gaps.length}</span> 个知识空白，AI 可自动联网补充`;
    $('researchBtn').disabled=false;
    $('researchBtn').textContent='授权搜索';
  }else{
    rbar.classList.add('hidden');
  }

  const body=$('wikiBody');body.innerHTML='';

  if(w.article){
    const s=wsec('知识文章');
    const p=document.createElement('div');p.className='warticle loaded';p.textContent=w.article;
    s.appendChild(p);body.appendChild(s);
  }
  if(w.nodes?.length){
    const s=wsec('核心节点');
    const wrap=document.createElement('div');wrap.className='nodes-wrap';
    w.nodes.forEach(n=>{const c=document.createElement('div');c.className='nchip';c.textContent=n;wrap.appendChild(c)});
    s.appendChild(wrap);body.appendChild(s);
  }
  if(w.connections?.length){
    const s=wsec('概念连接');
    const list=document.createElement('div');list.className='conn-list';
    w.connections.forEach(c=>{
      const d=document.createElement('div');d.className='conn';
      d.innerHTML=`<div class="conn-n">${c.from}<span class="carr">→</span>${c.to}</div><div class="conn-r">${c.relation}</div>`;
      list.appendChild(d);
    });
    s.appendChild(list);body.appendChild(s);
  }
  if(w.applications?.length){
    const s=wsec('应用方向');
    const list=document.createElement('div');list.className='app-list';
    w.applications.forEach(a=>{const d=document.createElement('div');d.className='app-item';d.textContent=a;list.appendChild(d)});
    s.appendChild(list);body.appendChild(s);
  }
  if(w.gaps?.length){
    const s=wsec('知识空白');
    const list=document.createElement('div');list.className='gap-list';
    w.gaps.forEach(g=>{const d=document.createElement('div');d.className='gap-item';d.textContent=g;list.appendChild(d)});
    s.appendChild(list);body.appendChild(s);
  }
  if(w.sources?.length){
    const s=wsec('来源文件');
    const list=document.createElement('div');list.className='src-list';
    w.sources.forEach(n=>{const d=document.createElement('div');d.className='src-item';d.textContent=n;list.appendChild(d)});
    s.appendChild(list);body.appendChild(s);
  }
}
function wsec(title){
  const el=document.createElement('div');el.className='wsec';
  const h=document.createElement('div');h.className='wsec-title';h.textContent=title;
  el.appendChild(h);return el;
}

// ── Copy / new ────────────────────────────────

// ── Autonomous Research Loop (Hermes mode) ────────────────────────────

async function runResearch(){
  const btn=$('researchBtn');
  btn.disabled=true;
  btn.textContent='搜索中…';
  $('compileBar').classList.remove('hidden');
  $('compileMsg').textContent='AI 正在自主搜索补充知识…';

  try{
    const res=await fetch(`${API}/api/research`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId,max_rounds:2})
    });
    if(!res.ok)throw new Error(`HTTP ${res.status}`);

    const reader=res.body.getReader();const dec=new TextDecoder();
    let buf='';

    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='round_start'){
            addSysMsg(`第 ${d.round} 轮搜索，处理 ${d.total_gaps} 个知识空白…`);
          }else if(d.type==='gap_start'){
            addSysMsg(`🔍 正在补充：${d.gap}`);
          }else if(d.type==='queries'){
            addSysMsg(`搜索词：${d.queries.join(' / ')}`);
          }else if(d.type==='search_done'){
            addSysMsg(`「${d.query}」找到 ${d.count} 条结果`);
          }else if(d.type==='synthesis'){
            const b=addMsg('assistant',`补充知识：${d.gap}\n\n${d.content}`);
          }else if(d.type==='compiling'){
            $('compileMsg').textContent='正在将新知识整合进知识库…';
          }else if(d.type==='wiki_updated'){
            wikiData=d.wiki;
            renderWiki(wikiData);
            addSysMsg(`✓ 知识库已更新，健康度 ${wikiData.health_score}%`);
            loadSessionList();
          }else if(d.type==='log'){
            addSysMsg(d.text);
          }else if(d.type==='error'){
            addSysMsg(`⚠️ ${d.message}`);
          }else if(d.type==='done'){
            addSysMsg('自主研究完成，知识库已就绪。');
            if(!$('goalBox').classList.contains('visible')){
              $('goalBox').classList.add('visible');
            }
          }
        }catch{}
      }
    }
  }catch(err){
    addSysMsg(`搜索出错：${err.message}`);
  }

  $('compileBar').classList.add('hidden');
  btn.textContent='再次搜索';
  btn.disabled=false;
}

function copyOut(){
  navigator.clipboard.writeText($('outBody').textContent).then(()=>{
    const b=document.querySelector('.copy-btn');b.textContent='已复制';setTimeout(()=>b.textContent='复制',2000);
  });
}

function newSession(){
  sessionId='';stage='explore';history=[];exploreHistory=[];wikiData=null;
  outputGoal='';streaming=false;pendingFiles=[];welcomeRawFiles=[];
  $('msgs').innerHTML='';$('msgs').style.display='none';
  $('inputArea').style.display='none';$('chatIn').value='';
  $('goalBox').classList.remove('visible');
  $('outWrap').classList.remove('visible');$('outBody').textContent='';
  $('compileBar').classList.add('hidden');
  $('wikiCol').classList.add('hidden');
  $('wikiBody').innerHTML='<div class="wiki-ph">投入内容后，AI 会自动编译成结构化知识库，显示在这里。</div>';
  $('hval').textContent='-';$('hfil').style.strokeDashoffset='56.55';
  $('welcome').style.display='flex';$('startTa').value='';
  renderWelcomeFiles();setStage('explore');loadSessionList();
}

loadSessionList();
